spring:
  config:
    import: optional:dotenv:.env
  jackson:
    time-zone: UTC
  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:none}
    show-sql: false

server:
  port: ${PORT:8081}

logging:
  config: classpath:logback-spring.xml

app:
  security:
    jwt:
      secret: ${JWT_SECRET:}
      issuer: ${JWT_ISSUER:JobTrackerApplicationBackend}
      expiration-seconds: ${JWT_EXPIRATION_SECONDS:3600}
